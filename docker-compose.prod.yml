services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./airbnb-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      POSTGRES_URL: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      AUTH0_ISSUER: ${AUTH0_ISSUER}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
      AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET}
      AUTH0_ROLE_LANDLORD_ID: ${AUTH0_ROLE_LANDLORD_ID}
    networks:
      - app-network
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.airbnb-backend.rule=Host(`airbnb.mostafadarwesh.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.airbnb-backend.entrypoints=websecure"
      - "traefik.http.routers.airbnb-backend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.airbnb-backend.priority=2"
      - "traefik.http.services.airbnb-backend.loadbalancer.server.port=8081"

  frontend:
    build: ./airbnb-frontend
    restart: unless-stopped
    networks:
      - app-network
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.airbnb-frontend.rule=Host(`airbnb.mostafadarwesh.com`)"
      - "traefik.http.routers.airbnb-frontend.entrypoints=websecure"
      - "traefik.http.routers.airbnb-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.airbnb-frontend.loadbalancer.server.port=80"
      # Lower priority so /api, /oauth2, /login routes match backend first
      - "traefik.http.routers.airbnb-frontend.priority=1"

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
  traefik-net:
    external: true
